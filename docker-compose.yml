services:
  # Servidor da Aplicação Laravel com Octane
  app:
    build:
      context: .
      dockerfile: Dockerfile      
    image: laravel:octane
    container_name: laravel_octane_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - laravel_network

  # Servidor Web Nginx como Proxy Reverso
  nginx:
    image: nginx:alpine
    container_name: laravel_octane_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge